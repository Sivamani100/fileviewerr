name: arkioviewer
description: "ArkioViewer - A universal file viewer for Android."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  permission_handler: ^12.0.1
  file_picker: ^11.0.2
  path_provider: ^2.1.3
  path: ^1.9.0
  mime: ^1.0.5
  
  # PDF
  syncfusion_flutter_pdfviewer: ^33.2.6
  
  # Images
  flutter_svg: ^2.0.10+1
  image: ^4.2.0
  
  # Video & Audio
  video_player: ^2.8.7
  chewie: ^1.7.5
  just_audio: ^0.10.4
  audio_video_progress_bar: ^2.0.1
  
  # Office Documents (docx, xlsx, pptx)
  archive: ^3.6.1
  xml: ^6.5.0
  html: ^0.15.4
  flutter_widget_from_html: ^0.17.2
  
  # Markdown
  flutter_markdown: ^0.7.3
  
  # Syntax highlighting (for code files)
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0
  
  # CSV
  csv: ^6.0.0
  
  # Misc
  share_plus: ^12.0.2
  open_filex: ^4.5.0
  url_launcher: ^6.3.0
  intl: ^0.19.0
  device_info_plus: ^12.4.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
